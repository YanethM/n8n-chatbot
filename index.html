<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Soporte B2B - Inteligencia Artificial</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="config.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-slate-800 rounded-2xl shadow-2xl p-6 border border-slate-700">
        <div class="flex items-center gap-3 mb-6">
            <div class="bg-indigo-600 p-2 rounded-lg text-2xl">🤖</div>
            <div>
                <h1 class="text-xl font-bold text-white">Módulo de Reportes Especializados</h1>
                <p class="text-xs text-slate-400">Automatizado con n8n Agent IA & Groq Cloud</p>
            </div>
        </div>

        <form id="ticketForm" class="space-y-4">
            <div>
                <label for="mensaje" class="block text-sm font-medium text-slate-300 mb-2">
                    Describe detalladamente la falla técnica o el incidente:
                </label>
                <textarea 
                    id="mensaje" 
                    rows="6" 
                    required
                    class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                    placeholder="Ej: Estimado equipo, registramos una caída crítica en nuestro entorno de producción desde las 08:00 AM..."
                ></textarea>
            </div>

            <button 
                type="submit" 
                id="btnEnviar"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-3 px-4 rounded-xl transition-colors cursor-pointer flex items-center justify-center gap-2"
            >
                <span id="btnText">Enviar Incidente a Clasificación IA</span>
                <svg id="spinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <div id="resultado" class="mt-6 p-4 rounded-xl hidden">
            <p id="resultadoText" class="text-sm font-medium"></p>
        </div>
    </div>

    <script>
        document.getElementById('ticketForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Evita que la página se recargue

            const N8N_WEBHOOK_URL = CONFIG.N8N_WEBHOOK_URL;

            const mensajeTexto = document.getElementById('mensaje').value;
            const btnEnviar = document.getElementById('btnEnviar');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const resultadoBox = document.getElementById('resultado');
            const resultadoText = document.getElementById('resultadoText');

            // Interfaz en modo "Procesando..."
            btnEnviar.disabled = true;
            btnEnviar.classList.add('opacity-50', 'cursor-not-allowed');
            btnText.innerText = 'La IA está analizando el caso...';
            spinner.classList.remove('hidden');
            resultadoBox.classList.add('hidden');

            try {
                // Petición HTTP POST enviando el JSON estructurado
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        mensaje_estudiante: mensajeTexto
                    })
                });

                if (response.ok) {
                    // Si n8n responde exitosamente
                    resultadoBox.className = "mt-6 p-4 rounded-xl bg-emerald-950/50 border border-emerald-500/30 text-emerald-400";
                    resultadoText.innerText = "✅ ¡Éxito! El incidente fue analizado por la IA, registrado en Google Sheets y notificado en el Telegram del equipo técnico.";
                    document.getElementById('mensaje').value = ''; // Limpiar formulario
                } else {
                    throw new Error('Error en la respuesta del servidor');
                }

            } catch (error) {
                // Captura de errores de red o caídas
                resultadoBox.className = "mt-6 p-4 rounded-xl bg-rose-950/50 border border-rose-500/30 text-rose-400";
                resultadoText.innerText = "❌ Error al conectar con el servidor de n8n. Revisa la consola o verifica la URL del Webhook.";
                console.error('Detalle del error:', error);
            } finally {
                // Restaurar la interfaz del botón
                btnEnviar.disabled = false;
                btnEnviar.classList.remove('opacity-50', 'cursor-not-allowed');
                btnText.innerText = 'Enviar Incidente a Clasificación IA';
                spinner.classList.add('hidden');
                resultadoBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
